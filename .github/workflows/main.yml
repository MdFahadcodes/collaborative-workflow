name: Collaborative Workflow

on:
  push:
    branches:
      - main

jobs:
  update_html_and_readme:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Update index.html
      - name: Update HTML
        run: |
          # Check if the GitHub actor is MdFahadcodes
          # Run the following CLI command to update index.html
          if [ "${{ github.actor }}" == "MdFahadcodes" ]; then
            sed -i '/<\/body>/i <p>Updated by MdFahadcodes on '"$(date)"'</p>' index.html
          fi